name: Fetch AI news

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check runtime env
        run: |
          node -e "console.log({
            urlExists: Boolean(process.env.NEXT_PUBLIC_SUPABASE_URL),
            urlStartsWithHttps: process.env.NEXT_PUBLIC_SUPABASE_URL?.startsWith('https://'),
            anonExists: Boolean(process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY),
            serviceRoleExists: Boolean(process.env.SUPABASE_SERVICE_ROLE_KEY),
            telegramTokenExists: Boolean(process.env.TELEGRAM_BOT_TOKEN),
            telegramChatIdExists: Boolean(process.env.TELEGRAM_CHAT_ID)
          })"

      - name: Fetch news
        run: node scripts/fetch-news.js