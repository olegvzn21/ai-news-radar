name: Fetch AI news

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check environment variables
        run: |
          echo "SUPABASE_URL_EXISTS=${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}"
          echo "SUPABASE_URL_STARTS_WITH_HTTPS=${{ startsWith(secrets.NEXT_PUBLIC_SUPABASE_URL, 'https://') }}"
          echo "ANON_KEY_EXISTS=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' }}"
          echo "SERVICE_ROLE_EXISTS=${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}"
          echo "TELEGRAM_TOKEN_EXISTS=${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
          echo "TELEGRAM_CHAT_ID_EXISTS=${{ secrets.TELEGRAM_CHAT_ID != '' }}"

      - name: Fetch news
        run: node scripts/fetch-news.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}